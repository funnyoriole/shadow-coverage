name: Shadow Coverage Daily Brief

on:
  schedule:
    # 11pm UTC = 11am AEST (UTC+10) weekdays
    # During AEDT (Oct–Apr, UTC+11): change to '0 0 * * 1-5'
    - cron: "0 1 * * 1-5"

  # Lets you trigger a manual run from the GitHub Actions tab — useful for testing
  workflow_dispatch:

jobs:
  run-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_brief.py

      - name: Send email
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python send_email.py

      - name: Build dashboard
        run: python build_dashboard.py

      - name: Deploy dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
