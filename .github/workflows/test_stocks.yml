name: Test Stock Brief

on:
  workflow_dispatch:

jobs:
  stock-brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate stock report
        env:
          GEMINI_API_KEY_STOCKS: ${{ secrets.GEMINI_API_KEY_STOCKS }}
        run: python generate_brief.py
      - name: Send stock email
        env:
          GMAIL_SENDER_STOCKS:       ${{ secrets.GMAIL_SENDER_STOCKS }}
          GMAIL_APP_PASSWORD_STOCKS: ${{ secrets.GMAIL_APP_PASSWORD_STOCKS }}
          GMAIL_RECIPIENT:           ${{ secrets.GMAIL_RECIPIENT }}
        run: python send_email.py
